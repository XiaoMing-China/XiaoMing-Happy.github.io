<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>
    <!-- 引入 GitHub 官方图标库 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-icons@0.11.0/font/github-icons.min.css">
    <style>
        /* 全局样式 */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 左上角语言选择器 */
        .lang-switch {
            position: absolute;
            top: 20px;
            left: 20px;
        }
        .lang-btn {
            padding: 8px 16px;
            margin: 0 4px;
            border: none;
            border-radius: 4px;
            background: #24292f;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        .lang-btn.active {
            background: #0969da;
        }

        /* GitHub 图标样式 */
        .github-icon {
            font-size: 100px;
            color: #181717;
            margin-bottom: 20px;
        }

        /* 文字样式 */
        .text {
            font-size: 24px;
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- 左上角语言切换 -->
    <div class="lang-switch">
        <button class="lang-btn active" onclick="changeLang('zh')">中文</button>
        <button class="lang-btn" onclick="changeLang('en')">English</button>
    </div>

    <!-- GitHub 图标 -->
    <div class="github-icon octicon-mark-github"></div>
    
    <!-- 可切换的文字 -->
    <div class="text" id="site-text">这是我的第一个网站✌</div>

    <script>
        // 语言切换逻辑
        const texts = {
            zh: "这是我的第一个网站✌",
            en: "This is my first website✌"
        };

        function changeLang(lang) {
            // 更新按钮状态
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 更新页面文字
            document.getElementById('site-text').textContent = texts[lang];
            document.documentElement.lang = lang;
        }
    </script>
</body>
</html>
